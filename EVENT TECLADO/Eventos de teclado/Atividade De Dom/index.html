<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css">


    <!-- #### Atividade DOM - Criando elementos  ####

Construa uma página web que permita montar a escalação de um time de jogadores. Nele deverá ser possível:

- Escalar um jogador
    - Informar a posição do jogador a ser escalado para o time.
    - Informar o nome do jogador.
    - Informar o número da camisa do jogador.
    - Ter um botão “Escalar” que pergunta ao usuário se ele deseja confirmar a escalação daquele jogador e então insere as informações em uma lista na página.
    - Após o jogador ser escalado os campos de texto devem ser limpos.
- Remover um jogador
    - Informar o número da camisa do jogador.
    - Ter um botão “Remover” que pergunta ao usuário se ele deseja confirmar a remoção daquele jogador e então exclui ele da lista na página.
    - Após o jogador ser removido o campo de texto deve ser limpo.

Dica: lembrando que é possível acessar o texto de um input através da propriedade value.
	 -->
</head>
<body>
    <div id="div1" class="escalar">
        


        <!-- posição -->
        <label for="Player">Posição:</label>
        <input placeholder="Posição" type="text" name="Position" id="Position" class="position">


         <!-- Numero do player -->
        <label for="NumberPlayer">Numero do jogador:</label>
        <input placeholder="Numero do jogador" type="number" name="NumeroJogador" id="NumberPlayer" class="NumberPlayer">
       
       
        <!-- Numero da camisa -->
         <label for="NumberShirt">Numero na Camisa:</label>
        <input placeholder="Numero da camisa" type="number" name="NumberShirt" id="Numbershirt" class="Numbershirt">
        
        <button id="button" onclick="escalar()" class="B_escalar">Escalar</button>
    </div>

    <div id="div2" class="retirar">
        
         <label for="NumberShirt">Numero na Camisa para retirar</label>
        
        <input type="number" name="RemovePlayer" id="RemovePlayer" class="RemovePlayerNumber">
        <button onclick="remove()" id="button" class="Remove">Remover</button>
    </div>

    <div class="confirmar">
        <button class="conf"> Sim </button>

        <button class="negar"> Nao </button>
    </div>
</body>
</html>
