<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Escalação de Time</title>
    <script src="../script/script.js" defer></script>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
  </head>
  <body>
    <header>
        
  

        <div class="header">

        <img class="palmeiras" src="/Images/Palmeiras.png" alt="palmeiras">
        <h1 class="tPalmeiras">Palmeiras</h1>
    </div>
    </header>
    <main>
    <div class="escalar">
      
    <details>
  <summary><h1>Escalar jogador</h1></label></summary>
      <label for="NamePlayer">Nome do jogador</label>
      <input placeholder="Nome do jogador" type="text" id="NamePlayer" />

      <label for="PositionPlayer">Posição do jogador</label>
      <input
        list="position"
        placeholder="Posição do jogador"
        id="PositionPlayer"
      />
      <datalist id="position">
        <option value="GL">Goleiro</option>
        <option value="LD">Lateral direito</option>
        <option value="LE">Lateral esquerdo</option>
        <option value="ZG">Zagueiro</option>
        <option value="LB">Líbero</option>
        <option value="VOL">Volante</option>
        <option value="MCD">Meio-campista defensivo</option>
        <option value="MC">Meio-campista central</option>
        <option value="MEI">Meio-campista ofensivo</option>
        <option value="AD">Ala direito</option>
        <option value="AE">Ala esquerdo</option>
        <option value="PD">Ponta direita</option>
        <option value="PE">Ponta esquerda</option>
        <option value="MD">Meia direita</option>
        <option value="ME">Meia esquerda</option>
        <option value="SA">Segundo atacante</option>
        <option value="CA">Centroavante</option>
        <option value="ATA">Atacante</option>
        <option value="F9">Falso 9</option>
        <option value="ARM">Armador</option>
      </datalist>

      <label for="NumberShirt">Número da camisa</label>
      <input 
      placeholder="Número da camisa"
      type="number" 
      id="NumberShirt" />
      <button id="btnEscalar" type="button">Escalar</button>
      </details>
    </div>
            
        <div class="remover">
            
            <details>
            <summary><h2>Remover Jogador</h2></label></summary>
             <label for="RemoveNumberShirt">Número da camisa</label>
            <input  
            placeholder="Digite o número da camisa para remover um jogador"
            class="RemoveNumberShirt" 
            type="number" 
            id="RemoveNumberShirt" />
            <button id="btnRemover" type="button">Remover</button>
        </div>

        <h2 class="txt2" id="txt2">ESCALAÇÃO : </h2>
            </details>
            
       
  
    </main>
  </body>
</html>
