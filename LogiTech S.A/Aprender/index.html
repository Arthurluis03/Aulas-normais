<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>LogiTech S.A</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #e6fbff;
  }

  /* HEADER */
  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 30px;
    background: #bff3ff;
    border-bottom: 2px solid #00aaff;
  }

  .logo {
    font-size: 24px;
    font-weight: bold;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-icon {
    width: 20px;
    height: 20px;
    background: black;
    border-radius: 50%;
  }

  /* HERO */
  .hero {
    display: flex;
    justify-content: space-between;
    padding: 60px;
    align-items: center;
  }

  .hero-text h1 {
    font-size: 28px;
  }

  .hero-text p {
    color: #555;
  }

  button {
    margin-top: 15px;
    padding: 10px 20px;
    background: black;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
  }

  .hero-box {
    width: 300px;
    height: 150px;
    background: #0f172a;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 8px;
  }

  /* CARDS */
  .cards {
    display: flex;
    gap: 20px;
    padding: 40px;
  }

  .card {
    flex: 1;
    background: #0f172a;
    color: white;
    padding: 20px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    gap: 15px;
  }

  .circle {
    width: 30px;
    height: 30px;
    background: #38bdf8;
    border-radius: 50%;
  }
</style>

</head>

<body>

<header>
  <div class="logo">
    <div class="logo-icon"></div>
    LogiTech S.A
  </div>
  <div>Admin</div>
</header>

<section class="hero">
  <div class="hero-text">
    <h1>A really compelling headline</h1>
    <p>meus textos textos e textos</p>
    <button>Call to action</button>
  </div>

  <div class="hero-box">
    LogiTech S.A
  </div>
</section>

<section class="cards">
  <div class="card">
    <div class="circle"></div>
    Seu futuro, suas decisões
  </div>
</section>

</body>
</html>
